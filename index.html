<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

  
<div class="container">
  <h2>🔐 Pantry Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  fetch("https://script.google.com/macros/s/AKfycbyyjBZ4mLGqFS3HtKZKz2S5rLtR-8lAWiL0LgLsCnJraEqofdnVb7Zn_W4PmZrDEkwyFQ/exec", {
    method: "POST",
    body: JSON.stringify({
      action: "login",
      username: username.value,
      password: password.value
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.status === "success") {
      localStorage.setItem("role", data.role);
      window.location = data.role === "admin" ? "admin.html" : "order.html";
    } else {
      alert("Invalid login");
    }
  });
}
</script>

</body>
</html>
