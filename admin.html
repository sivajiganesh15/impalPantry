<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">☕ Pantry Admin Dashboard</div>

<div class="dashboard" id="orders"></div>

<script>
fetch("https://script.google.com/macros/s/AKfycbyyjBZ4mLGqFS3HtKZKz2S5rLtR-8lAWiL0LgLsCnJraEqofdnVb7Zn_W4PmZrDEkwyFQ/exec", {
  method: "POST",
  body: JSON.stringify({ action: "getOrders" })
})
.then(res => res.json())
.then(data => {
  let html = "";

  data.slice(1).forEach(row => {
    html += `
      <div class="card">
        <b>${row[0]}</b><br>
        Ordered: ${row[1]}<br>
        <span class="badge">${row[2]}</span><br>
        <small>${new Date(row[3]).toLocaleString()}</small>
      </div>
    `;
  });

  document.getElementById("orders").innerHTML = html;
});
</script>

</body>
</html>
